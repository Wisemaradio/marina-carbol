<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marina Stereo 91.7 FM | El Carmen de Bolívar</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1db954">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
text-align:center;

background-image:url('banner.jpg');
background-size:cover;
background-position:center;
background-attachment:fixed;

height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.overlay{
background:rgba(0,0,0,0.80);
padding:40px;
border-radius:18px;
width:340px;
box-shadow:0 0 30px rgba(0,0,0,0.7);
}

.cover{
width:200px;
height:200px;
margin:auto;
margin-bottom:12px;
border-radius:15px;
background:white;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.cover img{
width:100%;
height:100%;
object-fit:contain;
}

h2{
margin:6px 0;
font-size:22px;
}

.location{
font-size:14px;
margin-bottom:10px;
opacity:0.9;
}

.song{
font-size:14px;
margin-bottom:18px;
color:#1db954;
font-weight:bold;
}

.play{
background:#1db954;
border:none;
padding:12px 25px;
border-radius:30px;
font-size:16px;
color:white;
cursor:pointer;
margin-bottom:10px;
}

.play:hover{
background:#17a74a;
}

.share{
margin-top:8px;
background:#007bff;
border:none;
padding:10px 20px;
border-radius:25px;
color:white;
font-size:14px;
cursor:pointer;
}

.install{
margin-top:8px;
background:#ff9800;
border:none;
padding:10px 20px;
border-radius:25px;
color:white;
cursor:pointer;
display:none;
}

.social img{
width:36px;
margin:8px;
transition:0.3s;
}

.social img:hover{
transform:scale(1.2);
}

</style>

</head>

<body>

<div class="overlay">

<div class="cover">
<img id="coverImg" src="logo.jpg">
</div>

<h2>Marina Stereo 91.7 FM</h2>

<div class="location">
El Carmen de Bolívar - Colombia
</div>

<div class="song" id="songTitle">
🎵 En vivo
</div>

<audio id="radio">
<source src="https://marina-carbol.wisemaradio.com/listen/marina-carbol/radio.mp3" type="audio/mpeg">
</audio>

<button class="play" onclick="togglePlay()" id="playBtn">
▶ Escuchar en vivo
</button>

<br>

<button class="share" onclick="compartirRadio()">
📲 Compartir emisora
</button>

<br>

<button class="install" id="installBtn">
📱 Instalar APP
</button>

<div class="social">

<a href="https://wa.me/573218178263" target="_blank">
<img src="Whatsapp.png">
</a>

<a href="https://www.instagram.com/marinastereo_arc/" target="_blank">
<img src="instagram.png">
</a>

<a href="https://www.facebook.com/share/185JMgMCwJ/" target="_blank">
<img src="facebook.png">
</a>

</div>

</div>

<script>

var audio=document.getElementById("radio");
var btn=document.getElementById("playBtn");

function togglePlay(){

if(audio.paused){
audio.play();
btn.innerHTML="⏸ Pausar";
}else{
audio.pause();
btn.innerHTML="▶ Escuchar en vivo";
}

}

/* INSTALAR APP */

let deferredPrompt;

window.addEventListener('beforeinstallprompt',(e)=>{
e.preventDefault();
deferredPrompt=e;
document.getElementById("installBtn").style.display="block";
});

document.getElementById("installBtn").addEventListener("click",()=>{
if(deferredPrompt){
deferredPrompt.prompt();
}
});

/* MOSTRAR BOTÓN */

window.addEventListener('load', () => {
setTimeout(() => {
if (deferredPrompt) {
document.getElementById("installBtn").style.display = "block";
}
}, 3000);
});

/* SERVICE WORKER */

if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
